<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIS Unique Courses Extractor V2.0</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 48px;
            max-width: 680px;
            width: 100%;
            box-shadow: 0 32px 64px rgba(0, 0, 0, 0.4),
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 20%, rgba(120, 80, 255, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(80, 200, 255, 0.06) 0%, transparent 50%);
            pointer-events: none;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
            z-index: 1;
        }

        .logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #7c3aed, #3b82f6);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 28px;
            box-shadow: 0 8px 24px rgba(124, 58, 237, 0.4);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        h1 {
            color: #fff;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            font-weight: 400;
        }

        .upload-zone {
            position: relative;
            z-index: 1;
            border: 2px dashed rgba(124, 58, 237, 0.4);
            border-radius: 16px;
            padding: 40px 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(124, 58, 237, 0.05);
            margin-bottom: 24px;
        }

        .upload-zone:hover {
            border-color: rgba(124, 58, 237, 0.8);
            background: rgba(124, 58, 237, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(124, 58, 237, 0.2);
        }

        .upload-zone.dragover {
            border-color: #7c3aed;
            background: rgba(124, 58, 237, 0.15);
            transform: scale(1.02);
        }

        .upload-zone.has-file {
            border-color: rgba(34, 197, 94, 0.6);
            background: rgba(34, 197, 94, 0.08);
        }

        .upload-icon {
            font-size: 40px;
            margin-bottom: 12px;
            display: block;
        }

        .upload-text {
            color: rgba(255, 255, 255, 0.7);
            font-size: 15px;
            font-weight: 500;
        }

        .upload-hint {
            color: rgba(255, 255, 255, 0.35);
            font-size: 12px;
            margin-top: 8px;
        }

        .file-name {
            color: #a78bfa;
            font-weight: 600;
            font-size: 14px;
            margin-top: 8px;
            word-break: break-all;
        }

        #fileInput {
            display: none;
        }

        .btn {
            position: relative;
            z-index: 1;
            width: 100%;
            padding: 16px 32px;
            border: none;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #7c3aed, #3b82f6);
            color: #fff;
            box-shadow: 0 4px 16px rgba(124, 58, 237, 0.4);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(124, 58, 237, 0.5);
        }

        .btn-primary:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .status {
            position: relative;
            z-index: 1;
            margin-top: 24px;
            text-align: center;
        }

        .status-msg {
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .status-msg.info {
            background: rgba(59, 130, 246, 0.15);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: #93c5fd;
        }

        .status-msg.success {
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
        }

        .status-msg.error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        .stats {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 20px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .stat-value {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.45);
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }

        .footer {
            position: relative;
            z-index: 1;
            text-align: center;
            margin-top: 32px;
            color: rgba(255, 255, 255, 0.25);
            font-size: 12px;
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">📊</div>
            <h1>SIS Unique Courses Extractor</h1>
            <p class="subtitle">Upload your SIS Result Sheet &middot; Extract courses &amp; CGPA</p>
        </div>

        <div class="upload-zone" id="uploadZone">
            <span class="upload-icon">📁</span>
            <div class="upload-text">Click to upload or drag &amp; drop</div>
            <div class="upload-hint">Supports .xlsx files from SIS</div>
            <div class="file-name hidden" id="fileName"></div>
        </div>
        <input type="file" id="fileInput" accept=".xlsx,.xls">

        <button class="btn btn-primary" id="processBtn" disabled>
            <span id="btnText">⚡ Extract &amp; Generate Excel</span>
            <span class="spinner hidden" id="btnSpinner"></span>
        </button>

        <div class="status" id="statusArea"></div>
        <div class="stats hidden" id="statsArea">
            <div class="stat-card">

            </div>
            <div class="stat-card">
                <div class="stat-value" id="statCourses">0</div>
                <div class="stat-label">Unique Courses</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statCodes">0</div>
                <div class="stat-label">Course Codes</div>
            </div>
        </div>

        <div class="footer">
            Version 2.0 &middot; Haitham El-Hussieny :)
        </div>
    </div>

    // ===== DOM Elements =====
    const uploadZone = document.getElementById('uploadZone');
    const fileInput = document.getElementById('fileInput');
    const fileNameEl = document.getElementById('fileName');
    const processBtn = document.getElementById('processBtn');
    const btnText = document.getElementById('btnText');
    const btnSpinner = document.getElementById('btnSpinner');
    const statusArea = document.getElementById('statusArea');
    const statsArea = document.getElementById('statsArea');

    let selectedFile = null;

    // ===== Upload Handling =====
    uploadZone.addEventListener('click', () => fileInput.click());

    uploadZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadZone.classList.add('dragover');
    });

    uploadZone.addEventListener('dragleave', () => {
        uploadZone.classList.remove('dragover');
    });

    uploadZone.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadZone.classList.remove('dragover');
        if (e.dataTransfer.files.length) {
            handleFile(e.dataTransfer.files[0]);
        }
    });

    fileInput.addEventListener('change', () => {
        if (fileInput.files.length) {
            handleFile(fileInput.files[0]);
        }
    });

    function handleFile(file) {
        const ext = file.name.split('.').pop().toLowerCase();
        if (ext !== 'xlsx' && ext !== 'xls') {
            showStatus('Please upload an .xlsx or .xls file.', 'error');
            return;
        }
        selectedFile = file;
        fileNameEl.textContent = file.name;
        fileNameEl.classList.remove('hidden');
        uploadZone.classList.add('has-file');
        processBtn.disabled = false;
        showStatus('File loaded. Click the button to extract.', 'info');
    }

    // ===== Processing =====
    processBtn.addEventListener('click', () => {
        if (!selectedFile) return;
        processFile(selectedFile);
    });

    function showStatus(msg, type) {
        statusArea.innerHTML = `<div class="status-msg ${type}">${msg}</div>`;
    }

    function processFile(file) {
        btnText.textContent = 'Processing...';
        btnSpinner.classList.remove('hidden');
        processBtn.disabled = true;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheetName = workbook.SheetNames[0];
                const sheet = workbook.Sheets[sheetName];
                const range = XLSX.utils.decode_range(sheet['!ref']);

                // ===== Search for cells containing "Name" =====
                const nameCells = [];
                for (let R = range.s.r; R <= range.e.r; R++) {
                    for (let C = range.s.c; C <= range.e.c; C++) {
                        const addr = XLSX.utils.encode_cell({ r: R, c: C });
                        const cell = sheet[addr];
                        if (cell && typeof cell.v === 'string' && cell.v.includes('Name')) {
                            nameCells.push({ row: R, col: C });
                        }
                    }
                }

                if (nameCells.length === 0) {
                    showStatus('No student data found in the file.', 'error');
                    resetBtn();
                    return;
                }

                // ===== Find CGPA column in each header row =====
                function findCGPAColumn(headerRow) {
                    for (let C = range.s.c; C <= range.e.c; C++) {
                        const addr = XLSX.utils.encode_cell({ r: headerRow, c: C });
                        const cell = sheet[addr];
                        if (cell && typeof cell.v === 'string' && cell.v.toUpperCase().includes('CGPA')) {
                            return C;
                        }
                    }
                    return null;
                }

                // ===== Get non-empty cells in a row =====
                function getNonEmptyCells(rowIdx) {
                    const cells = [];
                    for (let C = range.s.c; C <= range.e.c; C++) {
                        const addr = XLSX.utils.encode_cell({ r: rowIdx, c: C });
                        const cell = sheet[addr];
                        if (cell && cell.v !== undefined && cell.v !== null && cell.v !== '') {
                            cells.push(cell.v);
                        }
                    }
                    return cells;
                }

                // ===== Process each student =====
                const outputRows = [];
                const courseSet = new Set();
                const courseList = [];

                // Header row for output
                outputRows.push([]); // placeholder, will fill after

                for (const nameCell of nameCells) {
                    const dataRow = nameCell.row + 1;
                    const studentData = getNonEmptyCells(dataRow);

                    // Find CGPA
                    const cgpaCol = findCGPAColumn(nameCell.row);
                    let cgpaValue = null;
                    if (cgpaCol !== null) {
                        // Match the user's modified logic: read from dataRow + 1 (row+2 from Name)
                        const cgpaAddr = XLSX.utils.encode_cell({ r: dataRow + 1, c: cgpaCol });
                        const cgpaCell = sheet[cgpaAddr];
                        cgpaValue = cgpaCell ? cgpaCell.v : null;
                    }

                    // Insert CGPA right after the ID (index 1)
                    const rowWithCGPA = [...studentData];
                    if (cgpaValue !== null && cgpaValue !== undefined) {
                        rowWithCGPA.splice(1, 0, cgpaValue); // insert after ID
                    } else {
                        rowWithCGPA.splice(1, 0, ''); // placeholder to keep columns aligned
                    }
                    outputRows.push(rowWithCGPA);

                    // Collect unique courses (skip first 4 items: ID, CGPA, Name, etc.)
                    const courses = studentData.slice(3);
                    for (const course of courses) {
                        if (!courseSet.has(course)) {
                            courseSet.add(course);
                            courseList.push(course);
                        }
                    }
                }

                // Set header row
                if (outputRows.length > 1) {
                    const maxCols = Math.max(...outputRows.slice(1).map(r => r.length));
                    const header = [];
                    for (let i = 0; i < maxCols; i++) header.push('');
                    // Place "CGPA" header at column index 1 (after ID)
                    if (maxCols > 1) header[1] = 'CGPA';
                    outputRows[0] = header;
                }

                // ===== Build Unique List section =====
                // 2 empty rows then "Unique List" header then the courses in one row
                outputRows.push([]);
                outputRows.push(['Unique List']);
                outputRows.push(courseList);

                // ===== Build Code List section =====
                const codeEntries = [];
                const codeList = [];
                for (const item of courseList) {
                    const parts = item.split(' - ').map(s => s.trim());
                    for (let i = 0; i < parts.length; i += 2) {
                        if (parts[i]) codeList.push(parts[i]);
                    }
                }

                outputRows.push([]);
                outputRows.push(['Code List', 'Course CH']);
                for (const code of codeList) {
                    const ch = chData[code];
                    outputRows.push([code, ch !== undefined ? ch : '']);
                }

                // ===== Generate output Excel =====
                const ws = XLSX.utils.aoa_to_sheet(outputRows);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');

                const outName = file.name.replace(/\.(xlsx|xls)$/i, '') + '_unique_list.xlsx';
                XLSX.writeFile(wb, outName);

                // ===== Update UI =====
                document.getElementById('statStudents').textContent = nameCells.length;
                document.getElementById('statCourses').textContent = courseList.length;
                document.getElementById('statCodes').textContent = codeList.length;
                statsArea.classList.remove('hidden');

                showStatus(`✅ Done! Downloaded "${outName}" with ${nameCells.length} student(s) and ${courseList.length} unique courses.`, 'success');

            } catch (err) {
                showStatus(`Failed to process file: ${err.message}`, 'error');
                console.error(err);
            }
            resetBtn();
        };

        reader.onerror = function() {
            showStatus('Failed to read the file.', 'error');
            resetBtn();
        };

        reader.readAsArrayBuffer(file);
    }

    function resetBtn() {
        btnText.textContent = '⚡ Extract & Generate Excel';
        btnSpinner.classList.add('hidden');
        processBtn.disabled = false;
    }
